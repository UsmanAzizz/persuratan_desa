name: Frontend Build Check

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend-spa

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install dependencies
      run: npm install

    - name: Build project
      run: npm run build

    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_IP }}
        username: root
        password: ${{ secrets.VPS_PASSWORD }}
        port: 22
        script: |
          # Ganti "/lokasi/folder/proyek/anda" dengan lokasi folder proyek di VPS Anda
          cd /lokasi/folder/proyek/anda
          git pull origin main
          cd frontend-spa
          npm install
          npm run build
